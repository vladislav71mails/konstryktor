<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор ключа</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #e9eff8 0%, #dae3f0 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .key-card {
            max-width: 580px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px rgba(0,30,60,0.5), 0 0 0 1px rgba(255,255,255,0.6) inset;
            overflow: hidden;
            transition: 0.2s;
        }
        .header {
            background: #0b1f33;
            color: white;
            padding: 30px 32px 25px;
        }
        .header h2 {
            margin: 0;
            font-weight: 500;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header p {
            margin: 12px 0 0;
            opacity: 0.75;
            font-size: 0.95rem;
        }
        .content {
            padding: 32px;
        }
        .info-box {
            background: #eef5ff;
            border-radius: 28px;
            padding: 16px 22px;
            margin-bottom: 28px;
            border: 1px solid #b9d1f0;
            color: #15355e;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .info-box code {
            background: #ffffffb3;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #0b2a50;
            border: 1px solid #90afda;
            font-size: 0.85rem;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e3f6e;
            margin-bottom: 8px;
            font-size: 0.95rem;
            letter-spacing: -0.2px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid #d2e0f2;
            border-radius: 38px;
            font-size: 1rem;
            background: white;
            outline: none;
            transition: 0.18s;
        }
        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.2);
        }
        .btn {
            background: white;
            border: 2px solid #bacfea;
            padding: 16px 28px;
            border-radius: 50px;
            font-weight: 700;
            color: #1e3a6b;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1.1rem;
            width: 100%;
        }
        .btn-primary {
            background: #1e3f6e;
            border-color: #1e3f6e;
            color: white;
            box-shadow: 0 10px 20px -10px #0b2a50;
            margin-bottom: 18px;
        }
        .btn-primary:hover {
            background: #143257;
            transform: scale(1.01);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .result-area {
            background: #0b1f2e;
            border-radius: 28px;
            padding: 22px;
            margin: 24px 0 10px;
            border: 1px solid #304c6e;
        }
        .result-label {
            color: #9bb9e3;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .key-display {
            background: #1a314a;
            color: #d4f0ff;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1.2rem;
            padding: 18px 18px;
            border-radius: 22px;
            word-break: break-all;
            border: 1px solid #3b5f89;
            box-shadow: inset 0 2px 5px #00000033;
            user-select: all;
        }
        .warning-note {
            color: #f9b5a0;
            font-size: 0.85rem;
            margin-top: 15px;
            background: #2d1f2b;
            padding: 12px 18px;
            border-radius: 40px;
            border-left: 4px solid #e57373;
        }
        .company-badge {
            background: #2563eb15;
            border-radius: 60px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px dashed #2563eb;
            color: #15355e;
            margin-bottom: 20px;
        }
        hr {
            border: 1px solid #cfdef5;
            margin: 25px 0;
        }
        .note {
            color: #4f658d;
            font-size: 0.9rem;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid #527eb0;
            color: #b7d6ff;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 12px;
        }
        .copy-btn:hover {
            background: #2b4b77;
            color: white;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="key-card">
    <div class="header">
        <h2>🔑 Генерация ключа</h2>
    </div>
    <div class="content">
        <!-- Форма входа -->
        <div class="form-group">
            <label>📧 Логин (email)</label>
            <input type="email" id="loginInput" placeholder="например, ivanov@company.ru" value="test@yougile.com">
        </div>
        <div class="form-group">
            <label>🔒 Пароль</label>
            <input type="password" id="passwordInput" placeholder="············" value="">
        </div>

        <!-- Кнопка запроса ключа -->
        <button class="btn btn-primary" id="generateBtn">🔄 Сгенерировать API-ключ</button>

        <!-- Блок результата -->
        <div class="result-area" id="resultBlock" style="display: none;">
            <div class="result-label">ваш персональный ключ</div>
            <div class="key-display" id="keyDisplay">H6HngIA816fpIhY7tBvWx/it3YbVvEt/33Sk8afA39MCR9a</div>
            <div class="flex-row">
                <button class="copy-btn" id="copyBtn">Скопировать</button>
                <span style="color:#7ca2cf; font-size:0.9rem; margin-left:auto;">💡 ключ нигде не хранится. Cохраните его</span>
            </div>
            <div class="warning-note" id="errorMessage" style="display: none;"></div>
        </div>

        <hr>
        <div style="margin-top: 16px; background:#edf4fe; border-radius: 30px; padding: 12px 18px;">
            <span style="color: #1e3f6e;">💡 После генерации сохраните ключ в <B>KeePass</B></span>
        </div>
    </div>
</div>

<script>
    (function() {
        const COMPANY_ID = '89e4e708-e101-46ce-885f-4797d3e814d4';

        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultBlock = document.getElementById('resultBlock');
        const keyDisplay = document.getElementById('keyDisplay');
        const errorMessage = document.getElementById('errorMessage');
        const copyBtn = document.getElementById('copyBtn');

        // Сброс отображения результата перед новой генерацией
        function hideResult() {
            resultBlock.style.display = 'none';
            errorMessage.style.display = 'none';
        }

        // Показать ошибку
        function showError(text) {
            resultBlock.style.display = 'block';
            keyDisplay.innerText = '─── ошибка ───';
            errorMessage.style.display = 'block';
            errorMessage.innerText = `❌ ${text}`;
            // скрываем старый ключ
        }

        // Показать ключ
        function showKey(key) {
            resultBlock.style.display = 'block';
            keyDisplay.innerText = key;
            errorMessage.style.display = 'none';
        }

        // Валидация
        function validateInputs() {
            const login = loginInput.value.trim();
            const pass = passwordInput.value.trim();
            if (!login) {
                showError('Введите логин (email)');
                return false;
            }
            if (!pass) {
                showError('Введите пароль');
                return false;
            }
            // простая проверка email
            if (!login.includes('@') || !login.includes('.')) {
                showError('Введите корректный email');
                return false;
            }
            return true;
        }

        // Генерация ключа
        async function generateKey() {
            // сброс
            hideResult();

            if (!validateInputs()) return;

            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();

            // Блокируем кнопку
            generateBtn.disabled = true;
            generateBtn.innerText = '⏳ Создание ключа...';

            try {
                const response = await fetch('https://yougile.com/api-v2/auth/keys', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        login: login,
                        password: password,
                        companyId: COMPANY_ID
                    })
                });

                const data = await response.json();

                if (response.ok && data.key) {
                    showKey(data.key);
                } else {
                    // Обработка ошибки от сервера
                    const errorText = data.message || data.error || JSON.stringify(data);
                    showError(`Ошибка ${response.status}: ${errorText}`);
                }
            } catch (error) {
                showError(`Сетевая ошибка: ${error.message}. Проверьте подключение к YouGile.`);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Сгенерировать ключ';
                // Пароль лучше сбросить? Но оставим на усмотрение пользователя, можно не сбрасывать.
                // Для безопасности поле пароля не очищаем автоматически, но даём возможность скопировать ключ.
            }
        }

        // Копирование ключа
        copyBtn.addEventListener('click', () => {
            const key = keyDisplay.innerText;
            if (key && key !== '─── ошибка ───') {
                navigator.clipboard.writeText(key).then(() => {
                    // Визуальная обратная связь
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = 'Скопировано!';
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                    }, 1500);
                }).catch(() => {
                    alert('Не удалось скопировать, выделите ключ вручную.');
                });
            }
        });

        // Обработчик кнопки генерации
        generateBtn.addEventListener('click', generateKey);

        // Также можно нажать Enter в поле пароля
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateKey();
            }
        });
        loginInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateKey();
            }
        });

        // Начальное скрытие блока результата
        hideResult();
    })();
</script>
</body>
</html>
