<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуальный HTML-редактор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Визуальный HTML-редактор</h1>
        <div>
            <button id="theme-toggle" class="theme-toggle">Темная тема</button>
            <button id="export-btn" class="export-btn">Экспорт HTML</button>
            <button id="import-btn" class="import-btn">Импорт HTML</button>
            <button id="clear-btn" class="clear-btn">Очистить</button>
        </div>
    </div>
    
<div class="toolbar">
    <!-- Группа форматирования текста -->
    <div class="toolbar-group">
        <button id="bold-btn" class="toolbar-btn" title="Жирный (Ctrl+B)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
            </svg>
        </button>
        <button id="italic-btn" class="toolbar-btn" title="Курсив (Ctrl+I)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="4" x2="10" y2="4"/>
                <line x1="14" y1="20" x2="5" y2="20"/>
                <line x1="15" y1="4" x2="9" y2="20"/>
            </svg>
        </button>
        <button id="underline-btn" class="toolbar-btn" title="Подчеркнутый (Ctrl+U)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/>
                <line x1="4" y1="21" x2="20" y2="21"/>
            </svg>
        </button>
        <button id="strikethrough-btn" class="toolbar-btn" title="Зачеркнутый">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M17.5 12H6.5"/>
                <path d="M16 6.5C16 4.5 14.5 3 12 3C9.5 3 8 4.5 8 6.5C8 9 11.5 9.5 11.5 12"/>
                <path d="M8 17.5C8 19.5 9.5 21 12 21C14.5 21 16 19.5 16 17.5C16 15 12.5 14.5 12.5 12"/>
            </svg>
        </button>
        <button id="code-btn" class="toolbar-btn" title="Вставить код">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"/>
                <polyline points="8 6 2 12 8 18"/>
            </svg>
        </button>
    </div>
    
    <div class="toolbar-separator"></div>
    
    <!-- Группа вставки -->
    <div class="toolbar-group">
        <button id="link-btn" class="toolbar-btn" title="Вставить ссылку">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
        </button>
        <button id="image-btn" class="toolbar-btn" title="Вставить изображение">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        </button>
    </div>
    
    <div class="toolbar-separator"></div>
    
    <!-- Группа шрифта -->
    <div class="toolbar-group">
        <div class="toolbar-select-wrapper">
            <select id="font-size" class="toolbar-select">
                <option value="">Размер текста</option>
                <option value="12px">Маленький (12px)</option>
                <option value="16px">Обычный (16px)</option>
                <option value="18px">Средний (18px)</option>
                <option value="24px">Большой (24px)</option>
                <option value="32px">Очень большой (32px)</option>
            </select>
        </div>
        <div class="toolbar-select-wrapper">
            <select id="font-family" class="toolbar-select">
                <option value="">Шрифт</option>
                <option value="'Inter', -apple-system, sans-serif">Inter</option>
                <option value="'Georgia', 'Times New Roman', serif">Georgia</option>
                <option value="'Roboto Mono', 'Courier New', monospace">Roboto Mono</option>
                <option value="'Merriweather', Georgia, serif">Merriweather</option>
            </select>
        </div>
    </div>
    
    <div class="toolbar-separator"></div>
    
    <!-- Группа цвета -->
    <div class="toolbar-group">
        <div class="color-input-wrapper">
            <input type="color" id="text-color" class="toolbar-color" value="#000000" title="Цвет текста">
            <span class="color-label">A</span>
        </div>
        <div class="color-input-wrapper">
            <input type="color" id="bg-color" class="toolbar-color" value="#ffff00" title="Цвет выделения">
            <span class="color-label bg-label">A</span>
        </div>
    </div>
    
    <div class="toolbar-separator"></div>
    
    <!-- Группа выравнивания -->
    <div class="toolbar-group">
        <button id="align-left" class="toolbar-btn" title="По левому краю">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="10" x2="15" y2="10"/>
                <line x1="3" y1="14" x2="21" y2="14"/>
                <line x1="3" y1="18" x2="17" y2="18"/>
            </svg>
        </button>
        <button id="align-center" class="toolbar-btn" title="По центру">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="6" y1="10" x2="18" y2="10"/>
                <line x1="3" y1="14" x2="21" y2="14"/>
                <line x1="5" y1="18" x2="19" y2="18"/>
            </svg>
        </button>
        <button id="align-right" class="toolbar-btn" title="По правому краю">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="9" y1="10" x2="21" y2="10"/>
                <line x1="3" y1="14" x2="21" y2="14"/>
                <line x1="7" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
    </div>
    
    <div class="toolbar-separator"></div>
    
    <!-- Группа списков -->
    <div class="toolbar-group">
        <button id="ordered-list" class="toolbar-btn" title="Нумерованный список">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <circle cx="4" cy="6" r="0.5" fill="currentColor"/>
                <circle cx="4" cy="12" r="0.5" fill="currentColor"/>
                <circle cx="4" cy="18" r="0.5" fill="currentColor"/>
            </svg>
        </button>
        <button id="unordered-list" class="toolbar-btn" title="Маркированный список">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <circle cx="4" cy="6" r="1" fill="currentColor"/>
                <circle cx="4" cy="12" r="1" fill="currentColor"/>
                <circle cx="4" cy="18" r="1" fill="currentColor"/>
            </svg>
        </button>
    </div>
</div>
    
    <div class="container">
        <div class="sidebar">
            <h3>Блоки и шаблоны</h3>
            <div class="templates">
                <!-- Категории будут добавлены через JavaScript -->
            </div>
        </div>
        
        <div class="editor-area">
            <div class="editor" id="editor">
                <div class="drop-zone" id="initial-drop-zone">Перетащите блоки сюда или выберите шаблон из боковой панели</div>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно экспорта -->
    <div class="modal" id="export-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Экспорт HTML</h2>
                <button class="close-modal">&times;</button>
            </div>
            <textarea class="export-area" id="export-area" readonly></textarea>
            <button class="btn" id="copy-btn">Копировать в буфер обмена</button>
        </div>
    </div>
    
    <!-- Модальное окно импорта -->
    <div class="modal" id="import-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Импорт HTML</h2>
                <button class="close-modal">&times;</button>
            </div>
            <textarea class="export-area" id="import-area" placeholder="Вставьте HTML код здесь..."></textarea>
            <button class="btn" id="import-confirm-btn">Импортировать</button>
        </div>
    </div>
    
    <!-- Модальное окно пользовательского HTML -->
    <div class="modal" id="custom-html-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Пользовательский HTML</h2>
                <button class="close-modal">&times;</button>
            </div>
            <textarea class="export-area" id="custom-html-area" placeholder="Введите ваш HTML код..."></textarea>
            <button class="btn" id="insert-custom-html">Вставить</button>
        </div>
    </div>

<script src="js/templates.js"></script>
<script src="js/dragDrop.js"></script>
<script src="js/converter.js"></script>
<script src="js/editor.js"></script>
<script src="js/main.js"></script>
</body>
</html>
